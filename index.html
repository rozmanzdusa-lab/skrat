<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SOS Gremlin - Pro Audio Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --brand-indigo: #4338ca;
            --brand-bg: #ffffff;
            --text-dark: #0f172a;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--brand-bg);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* UVODNA ANIMACIJA */
        #intro-splash {
            position: fixed; inset: 0; background: white; z-index: 200;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #video-container {
            position: fixed; inset: 0; background: black; z-index: 210;
            display: none; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.5s ease-in-out;
        }

        video { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* UI STATUSI */
        #loading-overlay {
            position: fixed; inset: 0; background: rgba(255,255,255,0.4); backdrop-filter: blur(8px);
            z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center;
        }

        #loading-text {
            animation: textPulse 2s infinite ease-in-out;
        }

        @keyframes textPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.98); }
        }

        #speaking-indicator {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #10b981; color: white; padding: 8px 16px;
            border-radius: 999px; font-size: 10px; font-weight: 800; text-transform: uppercase;
            letter-spacing: 1px; display: none; items-center: center; gap: 8px; z-index: 50;
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.4);
        }

        /* PROGRESS BAR */
        #progress-container {
            width: 100%; height: 4px; background: #e2e8f0; position: fixed; top: 0; left: 0; z-index: 150;
        }
        #progress-bar {
            width: 16%; height: 100%; background: var(--brand-indigo); transition: width 0.5s ease;
        }

        .step-content { 
            width: 100%; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(20px); opacity: 0;
        }
        .step-content:not(.hidden) { transform: translateY(0); opacity: 1; }

        .card-tile {
            background: #ffffff; border: 3px solid var(--text-dark);
            box-shadow: 6px 6px 0px 0px var(--text-dark); border-radius: 1.5rem;
            padding: 1.25rem; width: 100%; display: flex; flex-direction: column; gap: 1rem; position: relative;
        }

        .technical-name-label {
            font-family: monospace; font-size: 10px; text-transform: uppercase; font-weight: 900;
            color: var(--brand-indigo); text-align: center; letter-spacing: 1.5px; margin-bottom: -0.5rem;
        }

        .image-container {
            width: 100%; aspect-ratio: 1/1; border-radius: 1rem;
            background: #f1f5f9; display: flex; align-items: center; justify-content: center;
            overflow: hidden; border: 2px solid var(--text-dark);
        }

        .floating-gremlin { animation: float 4s ease-in-out infinite; }
        @keyframes float { 0% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-10px) rotate(2deg); } 100% { transform: translateY(0px) rotate(0deg); } }

        .btn-primary {
            background: var(--brand-indigo); color: white; font-weight: 900;
            padding: 1.1rem; border-radius: 1rem; width: 100%;
            border: 3px solid var(--text-dark); box-shadow: 4px 4px 0px 0px var(--text-dark);
            text-transform: uppercase; transition: all 0.2s;
        }

        .mic-active { 
            background: #ef4444 !important; 
            color: white !important; 
            border-color: #991b1b !important; 
            animation: micPulse 1.2s infinite; 
        }
        @keyframes micPulse { 
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); } 
            70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 
            100% { transform: scale(1); } 
        }

        .hidden { display: none !important; }
    </style>
</head>
<body onclick="unlockAudio()">

    <script>
        const apiKey = ""; 
        const loadingMessages = [
            "Brskam po tvojih možganih...", 
            "Krotim male pošasti...", 
            "Poliram gremlinove kremplje...", 
            "Pogajam se z amigdalo...", 
            "Resetiram živčni sistem...", 
            "Uravnavam prefrontalni korteks...", 
            "Hranim lačne nevrone...",
            "Umirjam dežurne paničarje...",
            "Uravnavam nivo škratovščine...",
            "Pripravljam nevro-stropalo...",
            "Štejem gremlinove zobe...",
            "Iščem stikalo za mir...",
            "Čistim nevronske poti s metlo...",
            "Lovim misli v nevidno mrežo..."
        ];
        const validGremlins = ["nimam_casa", "prijazen", "konflikt", "napaka", "dokoncati", "kontrola", "nisem_dober", "stisni", "generic"];
        
        const exercises = new Map([
            ["1-vaja", { title: "Postavljaj boljša vprašanja", how: "Kateri notranji vir moči mi je zdaj na voljo za ta izziv?" }],
            ["2-vaja", { title: "Ravnovesje med zahtevami in viri", how: "Opazi razmerje. Če zahteve presegajo vire, dodaj majhen vir." }],
            ["3-vaja", { title: "Poveži se z namenom", how: "Zakaj je to zares pomembno? Komu to koristi?" }],
            ["4-vaja", { title: "Začni cikel (daj / sprejmi)", how: "Podari prijazno besedo ali sprejmi pomoč." }],
            ["5-vaja", { title: "Zaključi cikel reaktivnosti", how: "Poimenuj: 'To je bil stres.' Naredi globok izdih." }],
            ["6-vaja", { title: "Poimenuj in umiri", how: "Tiho poimenuj: 'Zdaj opažam misli.' Brez analiziranja." }],
            ["7-vaja", { title: "Preusmeri pozornost", how: "Izberi nevtralno sidro (zvok) in ostani z njim 30s." }],
            ["8-vaja", { title: "Kaj je zdaj res", how: "Kaj je dejstvo in kaj moja zgodba? Poimenuj eno dejstvo." }],
            ["9-vaja", { title: "Povabi koherenco", how: "Roki na srce. Dihaj počasi in enakomerno." }],
            ["10-vaja", { title: "Popolni dih", how: "Počasi vdihni, kratek premor, še daljši izdih." }],
            ["11-vaja", { title: "Škatlasto dihanje", how: "Vdih 5s, zadrži 5s, izdih 5s, zadrži 5s. Ponovi 4x." }],
            ["12-vaja", { title: "Razbijalec ega", how: "Dvigni roke nad glavo. Ritmično jih premikaj gor-dol." }],
            ["13-vaja", { title: "Pesti jeze", how: "Stisni pesti, zadrži napetost, nato sprosti z izdihom." }],
            ["14-vaja", { title: "Progresivna sprostitev", how: "Zavestno napni eno mišično skupino za 7s, nato popolnoma sprosti." }],
            ["15-vaja", { title: "Prizemljitev s čuti", how: "Zaznaj stik stopal s tlemi. Poimenuj en zvok in vonj." }],
            ["16-vaja", { title: "Nežno somatsko gibanje", how: "Počasi se premikaj, kot telesu prija." }],
            ["17-vaja", { title: "Vidim – slišim – čutim", how: "Poimenuj 3 stvari, ki jih vidiš, 3 zvoke in 3 občutke." }],
            ["18-vaja", { title: "Zavesten trenutek", how: "Za trenutek se ustavi. En zavesten dih. Zaznaj telo." }],
            ["19-vaja", { title: "Ustvari ozadje varnosti", how: "Zaznaj stres, nato razširi pozornost na prostor." }],
            ["20-vaja", { title: "Začuti svoj sistem", how: "Preglej telo. Zaznaj energijo ali težo brez razlage." }],
            ["21-vaja", { title: "Izberi, kdo želiš biti", how: "Izberi vrednoto, ki jo želiš utelešati. Naredi mali korak." }],
            ["22-vaja", { title: "Kaj je zame zdaj dovolj", how: "Vprašaj se: 'Kaj je zame v tem trenutku dovolj?'" }]
        ]);

        const sysPersona = "Si SOS Gremlin. Govori slovensko, škratovsko in igrivo. Začni z medmetom. Vrni samo JSON s ključi: intro, explanation_q, appreciate, inquire, synthesis.";

        let state = { thought: "", gremlinData: { type: "generic" }, isMuted: false, audioUnlocked: false };
        let audioQueue = [], isProcessingQueue = false, nextAudioCache = null, globalAudio = new Audio();
        let recognition = null, silenceTimer = null, loadingInterval = null;
        let activeAudioObjectUrl = null, activeAudioWatchdog = null;
        
        const isLocal = window.location.hostname.includes("goog") || window.location.protocol === "blob:";

        function base64ToObjectUrl(base64Audio, mimeType = 'audio/mpeg') {
            const binary = atob(base64Audio);
            const len = binary.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) bytes[i] = binary.charCodeAt(i);
            const blob = new Blob([bytes], { type: mimeType });
            return URL.createObjectURL(blob);
        }

        function cleanupActiveAudioResources() {
            if (activeAudioWatchdog) {
                clearTimeout(activeAudioWatchdog);
                activeAudioWatchdog = null;
            }
            if (activeAudioObjectUrl) {
                try { URL.revokeObjectURL(activeAudioObjectUrl); } catch (e) {}
                activeAudioObjectUrl = null;
            }
        }

        function clearAudioHandlers() {
            globalAudio.onended = null;
            globalAudio.onerror = null;
            globalAudio.onabort = null;
            globalAudio.onpause = null;
        }

        function stopCurrentAudio(clearQueue = false) {
            try {
                cleanupActiveAudioResources();
                clearAudioHandlers();
                globalAudio.pause();
                globalAudio.removeAttribute('src');
                globalAudio.load();
            } catch (e) {
                console.error('Napaka pri ustavljanju audia:', e);
            }

            if (clearQueue) {
                audioQueue = [];
                nextAudioCache = null;
            }

            isProcessingQueue = false;
            document.getElementById('speaking-indicator').style.display = 'none';
        }

        function splitTextForTTS(text) {
            if (!text || typeof text !== 'string') return [];
            return text
                .replace(/([.!?])\s+/g, '$1|SPLIT|')
                .split('|SPLIT|')
                .map(chunk => chunk.trim())
                .filter(chunk => chunk.length > 0);
        }

        async function addToAudioQueue(text, elementId = null, isStatic = false, fileName = null) {
            if (state.isMuted) return;

            if (isStatic) {
                audioQueue.push({ type: 'static', url: `audio/intros/${fileName}.mp3`, elementId });
            } else if (text) {
                splitTextForTTS(text)
                    .forEach(chunk => audioQueue.push({ type: 'tts', text: chunk, elementId }));
            }

            if (!isProcessingQueue) processAudioQueue();
        }

        async function fetchAudioBlob(text, staticUrl) {
            if (staticUrl) return { src: staticUrl, isObjectUrl: false };

            const normalizedText = typeof text === 'string' ? text.trim() : '';
            if (!normalizedText) return null;

            try {
                const res = await fetch('/.netlify/functions/elevenlabs-proxy', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: normalizedText })
                });

                if (!res.ok) {
                    const errorText = await res.text().catch(() => '');
                    console.error('ElevenLabs fetch error:', res.status, errorText);
                    throw new Error('Audio error');
                }

                const data = await res.json();
                if (!data.audioContent) throw new Error('No audio content');

                return {
                    src: base64ToObjectUrl(data.audioContent, data.format || 'audio/mpeg'),
                    isObjectUrl: true
                };
            } catch (e) {
                console.error('ElevenLabs audio generation failed:', e);
                return null;
            }
        }

        async function processAudioQueue() {
            if (audioQueue.length === 0) {
                isProcessingQueue = false;
                cleanupActiveAudioResources();
                document.getElementById('speaking-indicator').style.display = 'none';
                return;
            }

            isProcessingQueue = true;
            const item = audioQueue.shift();
            document.getElementById('speaking-indicator').style.display = 'flex';

            try {
                const fetchedAudio = (nextAudioCache && nextAudioCache.text === item.text)
                    ? nextAudioCache.audio
                    : await fetchAudioBlob(item.text, item.type === 'static' ? item.url : null);

                nextAudioCache = null;

                if (!fetchedAudio || !fetchedAudio.src) {
                    console.error('Audio source manjka za chunk:', item.text);
                    isProcessingQueue = false;
                    return processAudioQueue();
                }

                cleanupActiveAudioResources();

                const audioSrc = fetchedAudio.src;
                if (fetchedAudio.isObjectUrl) activeAudioObjectUrl = audioSrc;

                const advanceQueue = () => {
                    cleanupActiveAudioResources();
                    clearAudioHandlers();
                    isProcessingQueue = false;
                    processAudioQueue();
                };

                clearAudioHandlers();
                globalAudio.onended = advanceQueue;
                globalAudio.onerror = (e) => {
                    console.error('Napaka pri predvajanju audia:', e);
                    advanceQueue();
                };
                globalAudio.onabort = advanceQueue;

                globalAudio.pause();
                globalAudio.removeAttribute('src');
                globalAudio.load();

                globalAudio.src = audioSrc;
                globalAudio.currentTime = 0;

                await globalAudio.play();

                const estimatedMs = Math.max(
                    4000,
                    Math.min(30000, Math.round(((item.text || '').length / 14) * 1000) + 2500)
                );

                activeAudioWatchdog = setTimeout(() => {
                    console.warn('Audio watchdog triggered, continuing queue.');
                    advanceQueue();
                }, estimatedMs);

                if (audioQueue.length > 0 && audioQueue[0].type === 'tts') {
                    const nxt = audioQueue[0].text;
                    fetchAudioBlob(nxt).then(audio => {
                        if (audio) nextAudioCache = { text: nxt, audio: audio };
                    }).catch(err => {
                        console.error('Napaka pri prefetchu naslednjega audia:', err);
                    });
                }
            } catch (e) {
                console.error('Napaka v processAudioQueue:', e);
                cleanupActiveAudioResources();
                isProcessingQueue = false;
                processAudioQueue();
            }
        }

        function unlockAudio() {
            if (state.audioUnlocked) return;
            try {
                const silentWav = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABAAZGF0YQAAAAA=';
                globalAudio.src = silentWav;
                globalAudio.volume = 0.001;
                globalAudio.play().then(() => {
                    globalAudio.pause();
                    globalAudio.currentTime = 0;
                    globalAudio.removeAttribute('src');
                    globalAudio.load();
                    globalAudio.volume = 1;
                    state.audioUnlocked = true;
                    console.log('[AUDIO] unlock success');
                }).catch((e) => {
                    console.warn('[AUDIO] unlock failed', e);
                });
            } catch (e) {
                console.warn('[AUDIO] unlock exception', e);
            }
        }

        function toggleListening(id, cb) {
            if (recognition) { if (silenceTimer) clearTimeout(silenceTimer); recognition.stop(); return; }
            stopCurrentAudio(true);
            const inputEl = document.getElementById(id);
            const micBtn = document.getElementById(`mic-${id}`);
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Speech) return;
            recognition = new Speech(); recognition.lang = 'sl-SI'; recognition.continuous = true; recognition.interimResults = false;
            recognition.onstart = () => { micBtn.classList.add('mic-active'); inputEl.value = ""; inputEl.placeholder = "Poslušam te..."; };
            recognition.onresult = (e) => {
                const transcript = e.results[e.results.length - 1][0].transcript;
                inputEl.value = transcript; 
                if (silenceTimer) clearTimeout(silenceTimer);
                silenceTimer = setTimeout(() => { if (recognition) recognition.stop(); }, 3000);
            };
            recognition.onend = () => {
                micBtn.classList.remove('mic-active'); 
                const finalVal = inputEl.value.trim();
                if (finalVal.length <= 2) {
                    inputEl.value = "Nisem te slišal...";
                    setTimeout(() => { inputEl.value = ""; inputEl.placeholder = inputEl.dataset.original || "Zapiši..."; recognition = null; }, 1500);
                } else {
                    setTimeout(() => { inputEl.placeholder = inputEl.dataset.original || "Zapiši..."; recognition = null; if (cb) cb(); }, 2000);
                }
                if (silenceTimer) clearTimeout(silenceTimer);
            };
            recognition.start();
        }

        async function callAI(prompt, sys) {
            const url = '/.netlify/functions/gemini-proxy';
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: sys }] },
                generationConfig: { responseMimeType: "application/json", temperature: 0.7 }
            };

            for (let attempt = 0; attempt < 3; attempt++) {
                let res;

                try {
                    res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                } catch (e) {
                    console.error('AI fetch failed:', e);
                    throw new Error('AI request failed');
                }

                let data;
                try {
                    data = await res.json();
                } catch (e) {
                    console.error('AI response is not valid JSON:', e);
                    throw new Error('AI returned invalid JSON');
                }

                if (!res.ok) {
                    console.error('AI HTTP error:', res.status, data);
                    if (res.status === 503 && attempt < 2) {
                        await new Promise(resolve => setTimeout(resolve, 1200));
                        continue;
                    }
                    throw new Error(data?.error || `AI HTTP ${res.status}`);
                }

                const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!text) {
                    console.error('AI response missing content:', JSON.stringify(data, null, 2));
                    throw new Error('AI response missing content');
                }

                return text;
            }

            throw new Error('AI request failed');
        }

        function safeParseJSON(raw, fallback = {}) {
            try {
                if (!raw || typeof raw !== 'string') return fallback;
                const cleaned = raw.replace(/```json|```/g, '').trim();
                return JSON.parse(cleaned);
            } catch (e) {
                console.error('JSON parse error:', e, raw);
                return fallback;
            }
        }

        async function identifyGremlin() {
            const input = document.getElementById('thought-input');
            if (!input.value.trim()) return;

            state.thought = input.value;
            startLoading();

            try {
                const [resT, resL] = await Promise.all([
                    callAI(`Uporabnik: "${state.thought}".`, sysPersona),
                    callAI(`Uporabnik: "${state.thought}". Vrni 'type'.`, "Vrni JSON {type: '...'} (nimam_casa, prijazen, konflikt, napaka, dokoncati, kontrola, nisem_dober, stisni, generic).")
                ]);

                const dataT = safeParseJSON(resT, {});
                const dataL = safeParseJSON(resL, { type: 'generic' });
                const sType = validGremlins.includes(dataL.type) ? dataL.type : 'generic';

                state.gremlinData = {
                    intro: dataT.intro || '',
                    explanation_q: dataT.explanation_q || '',
                    appreciate: dataT.appreciate || '',
                    inquire: dataT.inquire || '',
                    synthesis: dataT.synthesis || '',
                    type: sType
                };

                updateVisuals(sType);
                showStep(2);
                updateProgress(33);
                document.getElementById('gremlin-intro').innerText = state.gremlinData.intro;
                addToAudioQueue(state.gremlinData.intro);
            } catch (e) {
                console.error('identifyGremlin failed:', e);
                alert('Prišlo je do napake pri analizi. Poskusi znova.');
            } finally {
                stopLoading();
            }
        }

        function updateVisuals(t) { ['step2-img', 'step3-img', 'step4-img', 'step5-img'].forEach(id => { const el = document.getElementById(id); if(el) el.src = `images/gremlins/${t.replace(/_/g, " ")}.png`; }); document.getElementById('label-step2').innerText = t.toUpperCase() + ".PNG"; }
        function nameGremlin() { const name = document.getElementById('gremlin-name').value; document.getElementById('gremlin-dialog-name').innerText = name.toUpperCase() + ":"; document.getElementById('gremlin-explanation-q').innerText = state.gremlinData.explanation_q; showStep(3); updateProgress(50); addToAudioQueue(state.gremlinData.explanation_q); }
        async function getAppreciatePart() {
            state.dialogAnswer = document.getElementById('dialog-answer').value;
            startLoading();

            try {
                const res = await callAI(`Misel: "${state.thought}", Odgovor: "${state.dialogAnswer}".`, sysPersona);
                const data = safeParseJSON(res, {});
                state.gremlinData.inquire = data.inquire || '';
                document.getElementById('appreciate-text').innerText = data.appreciate || '';
                showStep(4);
                updateProgress(66);
                addToAudioQueue(data.appreciate || '');
            } catch (e) {
                console.error('getAppreciatePart failed:', e);
                alert('Prišlo je do napake pri obdelavi odgovora. Poskusi znova.');
            } finally {
                stopLoading();
            }
        }
        function getInquirePart() { document.getElementById('inquire-text').innerText = state.gremlinData.inquire; showStep(5); updateProgress(83); addToAudioQueue(state.gremlinData.inquire); }
        async function returnToStabilization() { 
            startLoading(); 

            try {
                const [resT, resL] = await Promise.all([
                    callAI(`Namera: "${document.getElementById('inquire-answer').value}".`, sysPersona),
                    callAI(`MISEL: ${state.thought}. Izberi ID vaje (1-vaja do 22-vaja).`, "Vrni JSON {final_vaja_id: '...-vaja'}.")
                ]); 

                const dataT = safeParseJSON(resT, {}); 
                const dataL = safeParseJSON(resL, { final_vaja_id: '11-vaja' }); 
                const exIdRaw = String(dataL.final_vaja_id || '11-vaja').toLowerCase().replace(/[^a-z0-9_-]/g, '');
                const exId = exercises.has(exIdRaw) ? exIdRaw : '11-vaja';
                const ex = exercises.get(exId); 

                showStep(6);
                updateProgress(100);
                const imgEl = document.getElementById('vaja-img');
                imgEl.src = `images/vaje/${exId}.png`;
                imgEl.onerror = () => imgEl.src = 'images/gremlins/generic.png';
                document.getElementById('vaja-title').innerText = ex.title;
                document.getElementById('vaja-how').innerText = ex.how;
                document.getElementById('final-synthesis').innerText = dataT.synthesis || '';
                addToAudioQueue((dataT.synthesis || '') + '. Zdaj vaja: ' + ex.title); 
            } catch (e) {
                console.error('returnToStabilization failed:', e);
                alert('Prišlo je do napake pri zaključku seje. Poskusi znova.');
            } finally {
                stopLoading();
            }
        }

        function playIntroVideo() { 
            unlockAudio(); 
            const splash = document.getElementById('intro-splash'); 
            const container = document.getElementById('video-container'); 
            const video = document.getElementById('intro-video'); 
            splash.style.opacity = '0';
            setTimeout(() => {
                splash.style.display = 'none'; container.style.display = 'flex';
                setTimeout(() => container.style.opacity = '1', 10);
                const videoTimer = setTimeout(() => finishVideo(), 8000);
                video.play().catch(e => { finishVideo(); });
                video.onended = () => { clearTimeout(videoTimer); finishVideo(); };
            }, 800);
            function finishVideo() {
                container.style.opacity = '0';
                setTimeout(() => { 
                    container.style.display = 'none'; 
                    const txt = "He! Oho! Jaz sem tvoj škrat. Kateri glas ti danes govori?";
                    document.getElementById('txt-step-1').innerText = txt; addToAudioQueue(txt); 
                }, 500);
            }
        }

        function startLoading() { 
            document.getElementById('loading-overlay').style.display = 'flex'; 
            let i = 0;
            if (loadingInterval) clearInterval(loadingInterval);
            document.getElementById('loading-text').innerText = loadingMessages[0];
            loadingInterval = setInterval(() => {
                i++;
                document.getElementById('loading-text').innerText = loadingMessages[i % loadingMessages.length];
            }, 3000); // Menjanje na 3 sekunde
        }

        function stopLoading() { 
            document.getElementById('loading-overlay').style.display = 'none'; 
            if (loadingInterval) { clearInterval(loadingInterval); loadingInterval = null; }
        }

        function showStep(n) { document.querySelectorAll('.step-content').forEach(el => el.classList.add('hidden')); document.getElementById(`step-${n}`).classList.remove('hidden'); }
        function updateProgress(p) { document.getElementById('progress-bar').style.width = p + '%'; }
        function toggleMute() { state.isMuted = !state.isMuted; document.getElementById('mute-btn').innerHTML = state.isMuted ? '<i class="fa-solid fa-volume-xmark"></i>' : '<i class="fa-solid fa-volume-high"></i>'; if (state.isMuted) stopCurrentAudio(false); }
        function resetApp() { location.reload(); }

        window.unlockAudio = unlockAudio;
        window.playIntroVideo = playIntroVideo;
    </script>
